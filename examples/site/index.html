    <meta name="description" content="ExampleRoom helps teams review source-backed work in collaborative AI rooms." />
    <meta name="robots" content="index,follow" />

        "@context": "https://schema.org",

        "name": "ExampleRoom",
        "url": "https://example.com/"

    <script>
      (function () {
        if (/[?&](room|demo|create)=/i.test(window.location.search)) {
          var robots = document.querySelector('meta[name="robots"]');
          robots.setAttribute("content", "noindex,nofollow");
        }
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>ExampleRoom</h1>

      <a href="/?create=1">Create a room</a>
